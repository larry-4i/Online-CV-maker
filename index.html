<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Info-Tec CV Services</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f6f9;
}

header {
    background: #0a66c2;
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    padding: 20px;
    max-width: 800px;
    margin: auto;
}

.card {
    background: white;
    padding: 20px;
    margin-top: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    background: #0a66c2;
    color: white;
    padding: 12px;
    border: none;
    width: 100%;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #004182;
}

.whatsapp {
    background: #25D366;
}

.pay {
    background: #ff9800;
}

footer {
    text-align: center;
    padding: 20px;
    font-size: 14px;
    color: #666;
}
</style>

</head>

<body>

<header>
    <h1>Info-Tec CV Services</h1>
    <p>Professional CV Writing & Job Application Support</p>
</header>

<div class="container">

    <div class="card">
        <h2>Order Your CV</h2>

        <form action="https://formspree.io/f/your-form-id" method="POST">
            
            <label>Full Name</label>
            <input type="text" name="name" required>

            <label>Email</label>
            <input type="email" name="email" required>

            <label>Phone Number (WhatsApp)</label>
            <input type="text" name="phone" required>

            <label>Career Level</label>
            <select name="level">
                <option>Student</option>
                <option>Graduate</option>
                <option>Professional</option>
            </select>

            <label>Details for CV</label>
            <textarea name="message" rows="5" placeholder="Write your education, skills, experience..." required></textarea>

            <button type="submit">Submit CV Request</button>
        </form>
    </div>

    <div class="card">
        <h2>Quick WhatsApp Order</h2>
        <a href="https://wa.me/254797337490?text=Hello%20I%20want%20a%20CV%20from%20Info-Tec" target="_blank">
            <button class="whatsapp">Order on WhatsApp</button>
        </a>
    </div>

    <div class="card">
        <h2>Make Payment</h2>
        <p>Pay to confirm your CV order</p>

        <a href="https://checkout.flutterwave.com/pay/your-payment-link" target="_blank">
            <button class="pay">Pay Now</button>
        </a>
    </div>

    <div class="card">
        <h2>Contact Info</h2>
        <p>WhatsApp: 0797337490</p>
        <p>Email: info@infotec.com</p>
    </div>

</div>

<footer>
    © 2026 Info-Tec CV Services. All rights reserved.
</footer>

</body>
</html>
